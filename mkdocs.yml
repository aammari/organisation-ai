site_name: Organisation AI
site_url: https://aammari.github.io/organisation-ai
site_description: Documentation officielle — Organisation AI MVP
site_author: Abdelaziz Ammari
repo_url: https://github.com/aammari/organisation-ai
repo_name: aammari/organisation-ai

theme:
  name: material
  language: fr
  palette:
    - scheme: slate
      primary: deep purple
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - fenced_code
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Accueil: index.md
  - Gouvernance:
    - Index: governance/index.md
    - G-01 Meeting Protocol: governance/MeetingProtocol-G01-v1_0.md
    - G-02 Data Retention: governance/DataRetention-G02-v1_0.md
    - G-03 Agent Onboarding: governance/AgentOnboarding-G03-v1_0.md
    - G-04 Config Management: governance/ConfigManagement-G04-v1_0.md
    - G-05 Security Policy: governance/SecurityPolicy-G05-v1_0.md
    - G-06 Capability Lifecycle: governance/CapabilityLifecycle-G06-v1_0.md
    - G-07 Glossaire: governance/Glossary-G07-v1_0.md
    - G-08 Exception Waiver: governance/ExceptionWaiver-G08-v1_0.md
    - G-09 AI Ethics: governance/AIEthics-G09-v1_0.md
    - G-10 Org Health Review: governance/OrgHealthReview-G10-v1_0.md
    - G-11 CEO Communication: governance/CEOCommunicationProtocol-G11-v1_1.md
  - Architecture: architecture/index.md
  - Design Technique: technical-design/index.md
  - Opérations: operations/index.md
  - Kernel:
    - Constitution: kernel/constitution_v1_5.md
    - ACP: kernel/acp_v1_3.md
    - Agent Model: kernel/agent_model_v1_2.md
    - Decision Governance: kernel/decision_governance_v1_3.md
    - WSM: kernel/wsm_v1_2.md
    - Operational Workflow: kernel/operational_workflow_v1_1.md
    - Glossaire: kernel/glossary_g07.md
